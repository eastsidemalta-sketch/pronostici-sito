app = "playsignal"
# cdg (Paris) invece di fra - a volte migliore routing verso API esterne
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  NODE_OPTIONS = "--max-old-space-size=1536"

# Solo app per test - cron disabilitato per evitare competizione risorse
[processes]
  app = "node server.js"
  # cron = "supercronic /app/crontab"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

# CPU performance (dedicata) invece di shared - più veloce ma ~$32/mese
[[vm]]
  memory = "2gb"
  cpu_kind = "performance"
  cpus = 1

# ── Regioni aggiuntive (Brasile e Colombia) ───────────────────────────────────
